name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playground
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: playground/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run check
      - run: npm run e2e
      - run: npm run build
